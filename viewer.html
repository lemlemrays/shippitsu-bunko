<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直筆文庫</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1208;
  color: #f0e6c8;
  font-family: serif;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ヘッダー */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 48px;
  background: rgba(20,12,4,0.9);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 100;
  backdrop-filter: blur(4px);
  gap: 10px;
}

#title { font-size: 17px; white-space: nowrap; }
#pager { font-size: 12px; color: #a09070; white-space: nowrap; }

#add-btn {
  background: #5c4a2a;
  border: none;
  color: #f0e6c8;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  font-family: serif;
  white-space: nowrap;
  transition: background 0.15s;
}
#add-btn:hover { background: #7a6238; }

/* ビューワー */
#stage {
  position: fixed;
  top: 48px; bottom: 56px;
  left: 0; right: 0;
  overflow: hidden;
  cursor: grab;
}
#stage.dragging { cursor: grabbing; }

#canvas {
  position: absolute;
  top: 50%; left: 50%;
  transform-origin: center center;
}

#canvas img {
  display: block;
  max-width: 90vw;
  max-height: calc(100vh - 120px);
  border-radius: 3px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7);
  pointer-events: none;
}

/* ページなし表示 */
#empty {
  position: fixed;
  top: 48px; bottom: 56px;
  left: 0; right: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: #6a5a3a;
}
#empty .big { font-size: 48px; }
#empty .msg { font-size: 15px; }

/* サムネイル一覧 */
#thumb-bar {
  position: fixed;
  top: 48px; bottom: 56px;
  right: 0;
  width: 90px;
  background: rgba(10,8,4,0.85);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 8px 6px;
  z-index: 90;
  transition: transform 0.2s;
}

#thumb-bar::-webkit-scrollbar { width: 3px; }
#thumb-bar::-webkit-scrollbar-thumb { background: #5c4a2a; border-radius: 2px; }

.thumb {
  width: 78px;
  height: 60px;
  object-fit: cover;
  border-radius: 3px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.15s, opacity 0.15s;
  opacity: 0.6;
}
.thumb:hover { opacity: 0.9; }
.thumb.active { border-color: #c8a050; opacity: 1; }

.thumb-wrap {
  position: relative;
  width: 78px;
}

.thumb-del {
  position: absolute;
  top: 2px; right: 2px;
  width: 16px; height: 16px;
  background: rgba(180,60,40,0.85);
  border: none;
  border-radius: 50%;
  color: white;
  font-size: 10px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity 0.15s;
}
.thumb-wrap:hover .thumb-del { opacity: 1; }

/* ナビバー */
#navbar {
  position: fixed;
  bottom: 0; left: 0; right: 90px;
  height: 56px;
  background: rgba(20,12,4,0.9);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  gap: 12px;
  backdrop-filter: blur(4px);
}

.nav-btn {
  background: #5c4a2a;
  border: none;
  color: #f0e6c8;
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  font-family: serif;
  transition: background 0.15s;
}
.nav-btn:hover { background: #7a6238; }
.nav-btn:disabled { opacity: 0.3; cursor: default; }

#zoom-bar {
  display: flex;
  align-items: center;
  gap: 8px;
}

.zoom-btn {
  background: #3a2e18;
  border: 1px solid #5c4a2a;
  color: #f0e6c8;
  width: 30px; height: 30px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.zoom-btn:hover { background: #5c4a2a; }

#zoom-label {
  font-size: 12px;
  color: #a09070;
  width: 38px;
  text-align: center;
}

/* フラッシュ */
#overlay {
  position: fixed;
  top: 48px; bottom: 56px;
  left: 0; right: 90px;
  pointer-events: none;
  z-index: 50;
  opacity: 0;
  transition: opacity 0.25s;
  background: rgba(240,230,200,0.08);
}
#overlay.flash { opacity: 1; }

/* ドロップゾーン */
#dropzone {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(92,74,42,0.25);
  border: 3px dashed #c8a050;
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  font-size: 20px;
  color: #f0e6c8;
}
#dropzone.active { display: flex; }
</style>
</head>
<body>

<input type="file" id="file-input" accept="image/*" multiple style="display:none">

<div id="header">
  <span id="title">📚 直筆文庫</span>
  <span id="pager"></span>
  <button id="add-btn">＋ 原稿を追加</button>
</div>

<div id="stage">
  <div id="canvas">
    <img id="page-img" src="" alt="原稿">
  </div>
  <div id="empty">
    <div class="big">📄</div>
    <div class="msg">原稿画像をここにドロップ<br>または「＋ 原稿を追加」から選択</div>
  </div>
</div>

<div id="overlay"></div>

<div id="thumb-bar"></div>

<div id="navbar">
  <button class="nav-btn" id="btn-prev">◀ 前</button>
  <div id="zoom-bar">
    <button class="zoom-btn" id="btn-zoom-out">－</button>
    <span id="zoom-label">100%</span>
    <button class="zoom-btn" id="btn-zoom-in">＋</button>
    <button class="zoom-btn" id="btn-reset" title="リセット">⌂</button>
  </div>
  <button class="nav-btn" id="btn-next">次 ▶</button>
</div>

<div id="dropzone">📄 ここにドロップして追加</div>

<script>
// ページデータ（base64で保持）
let pages = [];
let currentPage = 0;
let scale = 1;
let tx = 0, ty = 0;

const stage    = document.getElementById("stage");
const canvas   = document.getElementById("canvas");
const img      = document.getElementById("page-img");
const pager    = document.getElementById("pager");
const zoomLabel= document.getElementById("zoom-label");
const overlay  = document.getElementById("overlay");
const thumbBar = document.getElementById("thumb-bar");
const empty    = document.getElementById("empty");
const dropzone = document.getElementById("dropzone");
const fileInput= document.getElementById("file-input");

// ---- ストレージ ----
function save() {
  try {
    localStorage.setItem("shippitsu_pages", JSON.stringify(pages));
  } catch(e) {
    // 容量超過時は古いものから削除
    if (pages.length > 1) {
      pages.shift();
      save();
    }
  }
}

function load() {
  const raw = localStorage.getItem("shippitsu_pages");
  if (raw) pages = JSON.parse(raw);
}

// ---- 表示 ----
function applyTransform() {
  canvas.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(${scale})`;
  zoomLabel.textContent = Math.round(scale * 100) + "%";
}

function resetView() {
  scale = 1; tx = 0; ty = 0;
  applyTransform();
}

function renderThumbs() {
  thumbBar.innerHTML = "";
  pages.forEach((src, i) => {
    const wrap = document.createElement("div");
    wrap.className = "thumb-wrap";

    const t = document.createElement("img");
    t.className = "thumb" + (i === currentPage ? " active" : "");
    t.src = src;
    t.onclick = () => goTo(i);

    const del = document.createElement("button");
    del.className = "thumb-del";
    del.textContent = "×";
    del.onclick = (e) => { e.stopPropagation(); deletePage(i); };

    wrap.appendChild(t);
    wrap.appendChild(del);
    thumbBar.appendChild(wrap);
  });
}

function showPage(index) {
  if (pages.length === 0) {
    empty.style.display = "flex";
    canvas.style.display = "none";
    pager.textContent = "";
    document.getElementById("btn-prev").disabled = true;
    document.getElementById("btn-next").disabled = true;
    renderThumbs();
    return;
  }
  empty.style.display = "none";
  canvas.style.display = "block";
  img.src = pages[index];
  pager.textContent = `${index + 1} / ${pages.length}`;
  document.getElementById("btn-prev").disabled = index === 0;
  document.getElementById("btn-next").disabled = index === pages.length - 1;
  renderThumbs();
  resetView();
}

function goTo(index) {
  if (index < 0 || index >= pages.length) return;
  overlay.classList.add("flash");
  setTimeout(() => overlay.classList.remove("flash"), 250);
  currentPage = index;
  showPage(currentPage);
}

function deletePage(index) {
  pages.splice(index, 1);
  save();
  if (currentPage >= pages.length) currentPage = Math.max(0, pages.length - 1);
  showPage(currentPage);
}

// ---- 画像追加 ----
function addImages(files) {
  const promises = Array.from(files).map(file => new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  }));
  Promise.all(promises).then(results => {
    const wasEmpty = pages.length === 0;
    pages.push(...results);
    save();
    if (wasEmpty) currentPage = 0;
    showPage(currentPage);
    // 追加した最初のページへ
    if (wasEmpty) goTo(0);
    else goTo(pages.length - results.length);
  });
}

// ---- ボタン ----
document.getElementById("add-btn").onclick = () => fileInput.click();
fileInput.onchange = e => { addImages(e.target.files); fileInput.value = ""; };
document.getElementById("btn-zoom-in").onclick  = () => { scale = Math.min(5, scale + 0.25); applyTransform(); };
document.getElementById("btn-zoom-out").onclick = () => { scale = Math.max(0.25, scale - 0.25); applyTransform(); };
document.getElementById("btn-reset").onclick = resetView;
document.getElementById("btn-prev").onclick = () => goTo(currentPage - 1);
document.getElementById("btn-next").onclick = () => goTo(currentPage + 1);

// ---- ホイールズーム ----
stage.addEventListener("wheel", e => {
  e.preventDefault();
  scale = Math.max(0.25, Math.min(5, scale + (e.deltaY > 0 ? -0.1 : 0.1)));
  applyTransform();
}, { passive: false });

// ---- ドラッグ ----
let dragging = false, dragStartX, dragStartY, dragTx, dragTy, swipeStartX;

stage.addEventListener("mousedown", e => {
  dragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  dragTx = tx; dragTy = ty;
  swipeStartX = e.clientX;
  stage.classList.add("dragging");
});
window.addEventListener("mousemove", e => {
  if (!dragging) return;
  tx = dragTx + (e.clientX - dragStartX);
  ty = dragTy + (e.clientY - dragStartY);
  applyTransform();
});
window.addEventListener("mouseup", e => {
  if (!dragging) return;
  dragging = false;
  stage.classList.remove("dragging");
  const dx = e.clientX - swipeStartX;
  const moved = Math.abs(tx - dragTx) + Math.abs(ty - dragTy);
  if (scale <= 1.1 && Math.abs(dx) > 80 && moved < 30) {
    if (dx < 0) goTo(currentPage + 1);
    else goTo(currentPage - 1);
  }
});

// ---- タッチ ----
let touchStartX, touchStartY, touchTx, touchTy, pinchStartDist, pinchStartScale;

stage.addEventListener("touchstart", e => {
  if (e.touches.length === 1) {
    touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
    touchTx = tx; touchTy = ty;
  } else if (e.touches.length === 2) {
    pinchStartDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    pinchStartScale = scale;
  }
}, { passive: true });

stage.addEventListener("touchmove", e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    tx = touchTx + (e.touches[0].clientX - touchStartX);
    ty = touchTy + (e.touches[0].clientY - touchStartY);
    applyTransform();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    scale = Math.max(0.25, Math.min(5, pinchStartScale * (dist / pinchStartDist)));
    applyTransform();
  }
}, { passive: false });

stage.addEventListener("touchend", e => {
  if (e.changedTouches.length === 1 && scale <= 1.1) {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 60) {
      if (dx < 0) goTo(currentPage + 1);
      else goTo(currentPage - 1);
    }
  }
});

// ---- ドラッグ＆ドロップで追加 ----
document.addEventListener("dragover", e => {
  e.preventDefault();
  dropzone.classList.add("active");
});
document.addEventListener("dragleave", e => {
  if (e.relatedTarget === null) dropzone.classList.remove("active");
});
document.addEventListener("drop", e => {
  e.preventDefault();
  dropzone.classList.remove("active");
  if (e.dataTransfer.files.length) addImages(e.dataTransfer.files);
});

// ---- 初期化 ----
load();
showPage(currentPage);
applyTransform();
</script>
</body>
</html>
